<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWC Workshop Course</title>
    <meta name="description" content="Curso interactivo construido con cwc-cool-workshop-course.">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Monaco', 'Menlo', 'Consolas', 'monospace'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="static/css/custom.css">
    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    <script defer src="vendor/katex/katex.min.js"></script>
    <script defer src="vendor/katex/auto-render.min.js"></script>
    <script>
        window.renderMath = function(elementId) {
            const el = document.getElementById(elementId || 'app');
            if (el && window.renderMathInElement) {
                renderMathInElement(el, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '\\(', right: '\\)', display: false}
                    ]
                });
            }
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/brython@3.14.3/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3.14.3/brython_stdlib.js"></script>

    <style>
        #loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #loading-screen.fade-out { opacity: 0; pointer-events: none; }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased" onload="brython({debug: 1, pythonpath: ['.']})">

    <div id="loading-screen">
        <div class="text-center text-white">
            <div class="text-6xl mb-4">🎓</div>
            <h1 class="text-2xl font-bold mb-4">Cargando curso…</h1>
            <div class="loader mx-auto mb-4"></div>
        </div>
    </div>

    <div id="app-root" class="min-h-screen"></div>
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script type="text/python">
from browser import document, html, window, timer


def show_error_on_page(error_msg, traceback_text=""):
    loading = document.getElementById("loading-screen")
    if loading:
        loading.remove()
    app_root = document.getElementById("app-root")
    app_root.innerHTML = ""
    error_card = html.DIV(Class="bg-white rounded-xl shadow-lg p-8 max-w-2xl w-full")
    error_card <= html.H1("❌ Error de carga", Class="text-2xl font-bold text-red-600 mb-4")
    error_card <= html.P(str(error_msg), Class="text-red-800 font-mono bg-red-100 p-4 rounded mb-4")
    if traceback_text:
        error_card <= html.PRE(traceback_text, Class="text-xs text-gray-700 bg-gray-100 p-4 rounded overflow-auto max-h-64")
    error_card <= html.P("Abre la consola del navegador (F12) para más detalles.", Class="text-gray-500 mt-4 text-sm")
    app_root <= html.DIV(error_card, Class="min-h-screen flex items-center justify-center bg-red-50 p-8")


def start_app():
    try:
        from engine.app import init_app
        from engine.config import get_config
        init_app()
        document.title = get_config()['name']
        loading = document.getElementById("loading-screen")
        if loading:
            loading.classList.add("fade-out")
            timer.set_timeout(lambda: loading.remove(), 500)
    except Exception as e:
        import traceback
        import io
        tb_buffer = io.StringIO()
        traceback.print_exc(file=tb_buffer)
        show_error_on_page(e, tb_buffer.getvalue())


timer.set_timeout(start_app, 100)
    </script>

    <noscript>
        <div class="min-h-screen flex items-center justify-center">
            <p>Este curso interactivo requiere JavaScript habilitado.</p>
        </div>
    </noscript>

</body>
</html>
